server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: wazuh
    static_configs:
      - targets:
          - localhost
        labels:
          job: wazuh
          source: wazuh
          __path__: /var/ossec/logs/alerts/alerts.json
    pipeline_stages:
      - json:
          expressions:
            rule_id: rule.id
            rule_description: rule.description
            agent_name: agent.name
            rule_level: rule.level
            session_id: data.session_id
            telemetry_origin: data.telemetry_origin
            ground_truth_label: data.ground_truth_label
            scenario_family: data.scenario_family
            dataset_split: data.dataset_split
      - static_labels:
          attack_stage: other
          asset_class: other
          telemetry_origin: live_sensor
          ground_truth_label: observed
          dataset_split: observed
      - labels:
          rule_id:
          rule_description:
          agent_name:
          rule_level:
          session_id:
          telemetry_origin:
          ground_truth_label:
          scenario_family:
          dataset_split:
      - match:
          selector: '{agent_name=~"(?i).*(ews|engineering).*"}'
          stages:
            - static_labels:
                attack_stage: host_activity
                asset_class: ews
      - match:
          selector: '{rule_id="100301"}'
          stages:
            - static_labels:
                attack_stage: historian_web
                asset_class: historian
      - match:
          selector: '{rule_id="100302"}'
          stages:
            - static_labels:
                attack_stage: smb_access
                asset_class: smb
      - match:
          selector: '{rule_id="100306"}'
          stages:
            - static_labels:
                attack_stage: smb_access
                asset_class: smb
      - match:
          selector: '{rule_id="100303"}'
          stages:
            - static_labels:
                attack_stage: opcua_path
                asset_class: opcua
      - match:
          selector: '{rule_id="100307"}'
          stages:
            - static_labels:
                attack_stage: discovery
                asset_class: level3
      - match:
          selector: '{rule_id="100304"}'
          stages:
            - static_labels:
                attack_stage: opcua_write
                asset_class: opcua
      - match:
          selector: '{rule_id="100305"}'
          stages:
            - static_labels:
                attack_stage: opcua_write
                asset_class: opcua
      - match:
          selector: '{rule_id="100404"}'
          stages:
            - static_labels:
                attack_stage: host_command
                asset_class: ews
      - match:
          selector: '{rule_id="100405"}'
          stages:
            - static_labels:
                attack_stage: host_scriptblock
                asset_class: ews
      - match:
          selector: '{rule_id="100406"}'
          stages:
            - static_labels:
                attack_stage: process_anomaly
                asset_class: ews
      - match:
          selector: '{rule_id="100209"}'
          stages:
            - static_labels:
                attack_stage: process_anomaly
                asset_class: historian

  - job_name: ml
    static_configs:
      - targets:
          - localhost
        labels:
          job: ml
          source: ml
          __path__: /var/log/honeypot-ml/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            kind: kind
            model_name: model_name
            session_id: session_id
            split: split
            event_count: event_count
            total_event_count: total_event_count
            is_full_session: is_full_session
            stage_path: stage_path
            asset_path: asset_path
            predicted_danger_score: predicted_danger_score
            predicted_danger_label: predicted_danger_label
            predicted_dominant_stage: predicted_dominant_stage
            predicted_session_intent: predicted_session_intent
            predicted_session_intent_hybrid: predicted_session_intent_hybrid
            predicted_priority: predicted_priority
            danger_label: danger_label
            dominant_stage: dominant_stage
            thesis_readiness: thesis_readiness
            thesis_readiness_score: thesis_readiness_score
            verdict: verdict
            summary_text: summary_text
            total_examples: total_examples
            unique_base_sessions: unique_base_sessions
            full_session_examples: full_session_examples
            unique_stage_paths: unique_stage_paths
            unique_session_intents: unique_session_intents
            benign_full_sessions: benign_full_sessions
            attack_full_sessions: attack_full_sessions
            eval_examples: eval_examples
            eval_danger_label_accuracy: eval_danger_label_accuracy
            eval_stage_accuracy: eval_stage_accuracy
            eval_intent_accuracy: eval_intent_accuracy
            eval_intent_accuracy_hybrid: eval_intent_accuracy_hybrid
            eval_danger_mae: eval_danger_mae
      - timestamp:
          source: ts
          format: RFC3339Nano
      - labels:
          kind:
          model_name:
          session_id:
          split:
          predicted_danger_label:
          predicted_dominant_stage:
          predicted_session_intent:
          predicted_session_intent_hybrid:
          predicted_priority:
          thesis_readiness:
          verdict:
