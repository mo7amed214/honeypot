# Monitoring plane (monitoring host)
# SAFETY CONSTRAINT: must be runnable standalone. Do NOT depend on historian services.

services:
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/soc_ml.json
    volumes:
      - ${GRAFANA_DATA_PATH:-grafana_data}:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    volumes:
      - ../monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - ${LOKI_DATA_PATH:-loki_data}:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    command: -config.file=/etc/promtail/config.yml
    ports:
      - "${PROMTAIL_PORT:-9080}:9080"
    volumes:
      - ${WAZUH_ALERTS_PATH:-/var/snap/docker/common/var-lib-docker/volumes/single-node_wazuh_logs/_data/alerts}:/var/ossec/logs/alerts:ro
      - ../monitoring/ml:/var/log/honeypot-ml:ro
      - ${PERA_AUDIT_LOG_PATH:-/opt/pera/PERA-integration-ready-/logs}:/var/log/honeypot-l2:ro
      - ${SMB_LOG_PATH:-/var/lib/docker/volumes/compose_smb_logs/_data}:/var/log/smb:ro
      - ../services/historian/logs:/var/log/honeypot/historian:ro
      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ${PROMTAIL_POSITIONS_PATH:-promtail_positions}:/tmp
    depends_on:
      - loki
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  grafana_data:
    name: historian_service_grafana_data
  loki_data:
  promtail_positions:
