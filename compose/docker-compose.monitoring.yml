# Monitoring plane (monitoring host)
# SAFETY CONSTRAINT: must be runnable standalone. Do NOT depend on historian services.

services:
  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ../monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    command: -config.file=/etc/promtail/config.yml
    ports:
      - "${PROMTAIL_PORT:-9080}:9080"
    volumes:
      - /var/lib/docker/volumes/single-node_wazuh_logs/_data/alerts:/var/ossec/logs/alerts:ro
      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  grafana_data:
    name: historian_service_grafana_data
  loki_data:
  promtail_positions:
