services:
  lstm-session-model:
    image: honeypot-lstm-session:latest
    build:
      context: ..
      dockerfile: ml/lstm_session/Dockerfile
    working_dir: /workspace
    volumes:
      - ..:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - python
      - -m
      - ml.lstm_session.train
      - --scenario-root
      - artifacts/scenario-runs
      - --output-dir
      - ml/runs/latest
  lstm-session-runtime:
    image: honeypot-lstm-session:latest
    build:
      context: ..
      dockerfile: ml/lstm_session/Dockerfile
    working_dir: /workspace
    volumes:
      - ..:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - sh
      - -lc
      - while true; do sleep 3600; done
