networks:
  ot-net:

volumes:
  historian_data:
  grafana_data:
  loki_data:
  promtail_positions:

services:

  # ── OT Layer ────────────────────────────────────────────────────────────────

  opcua:
    build: ../services/opcua
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 256m

  smb:
    build: ../services/smb
    network_mode: host
    restart: unless-stopped
    mem_limit: 128m

  # ── Historian ────────────────────────────────────────────────────────────────

  historian-web:
    build:
      context: ../services/historian
      dockerfile: Dockerfile
    command: ["/app/docker-entrypoint.sh"]
    environment:
      SERVICE_NAME: ${HISTORIAN_WEB_SERVICE_NAME:-historian_web}
      DB_PATH: /data/historian.db
      EVENT_LOG_PATH: /var/log/historian/events.jsonl
      HISTORIAN_USERNAME: ${HISTORIAN_USERNAME:-john}
      HISTORIAN_PASSWORD: ${HISTORIAN_PASSWORD:-Cisco}
      SERVER_BASE: ${SERVER_BASE:-http://localhost:5000}
    ports:
      - "${HISTORIAN_WEB_PORT:-5000}:5000"
    volumes:
      - historian_data:/data
      - ../services/historian/logs:/var/log/historian
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 256m

  historian-ingest:
    build:
      context: ../services/historian
      dockerfile: Dockerfile
    command: ["python", "opcua_ingest.py"]
    environment:
      SERVICE_NAME: ${HISTORIAN_INGEST_SERVICE_NAME:-historian_ingest}
      DB_PATH: /data/historian.db
      EVENT_LOG_PATH: /var/log/historian/ingest.jsonl
      OPCUA_URL: ${OPCUA_URL:-opc.tcp://opcua:4840}
      NAMESPACE: ${OPCUA_NAMESPACE:-http://manufacturing.example/opcua}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-1.0}
    volumes:
      - historian_data:/data
      - ../services/historian/logs:/var/log/historian
    depends_on: [opcua]
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 128m

  # ── Monitoring (optional) ────────────────────────────────────────────────────
  # Start with: docker compose --profile monitoring up -d

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 256m

  loki:
    image: grafana/loki:2.9.8
    profiles: [monitoring]
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ../monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 256m

  promtail:
    image: grafana/promtail:2.9.8
    profiles: [monitoring]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail_positions:/tmp
    depends_on: [loki]
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 128m

  # ── Network Monitoring (optional) ────────────────────────────────────────────
  # network_mode: host lets Zeek see the Docker bridge interface (br-ot-net)
  # and all inter-container traffic flowing across it.

  zeek:
    image: zeek/zeek:latest
    profiles: [monitoring]
    network_mode: host
    cap_add: [NET_RAW, NET_ADMIN]
    volumes:
      - ../monitoring/zeek:/opt/zeek/share/zeek/site:ro
      - ../services/historian/logs:/var/log/honeypot:ro
    restart: unless-stopped
    mem_limit: 256m
