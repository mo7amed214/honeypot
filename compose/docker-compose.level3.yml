networks:
  ot-net:
  l2_l3_integration:
    external: true

volumes:
  historian_data:
  grafana_data:
  loki_data:
  promtail_positions:

services:

  # ── OT Layer ────────────────────────────────────────────────────────────────

  opcua:
    build: ../services/opcua
    environment:
      SCADA_L2_URL: ${SCADA_L2_URL:-}
    ports:
      - "4840:4840"
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 256m

  opcua-pera-bridge:
    build:
      context: ../services/opcua
      dockerfile: Dockerfile.bridge
    environment:
      SCADA_L2_URL: ${SCADA_L2_URL:-}
      OPCUA_URL: opc.tcp://opcua:4840
      PERA_BRIDGE_INTERVAL: "2.0"
    networks: [ot-net, l2_l3_integration]
    depends_on: [opcua]
    restart: unless-stopped
    mem_limit: 64m

  smb:
    build: ../services/smb
    network_mode: host
    restart: unless-stopped
    mem_limit: 128m

  # ── Historian ────────────────────────────────────────────────────────────────

  historian-web:
    build:
      context: ../services/historian
      dockerfile: Dockerfile
    command: ["/app/docker-entrypoint.sh"]
    environment:
      SERVICE_NAME: ${HISTORIAN_WEB_SERVICE_NAME:-historian_web}
      DB_PATH: /data/historian.db
      EVENT_LOG_PATH: /var/log/historian/events.jsonl
      HISTORIAN_USERNAME: ${HISTORIAN_USERNAME:-john}
      HISTORIAN_PASSWORD: ${HISTORIAN_PASSWORD:-Cisco}
      SERVER_BASE: ${SERVER_BASE:-http://localhost:5000}
    ports:
      - "${HISTORIAN_WEB_PORT:-5000}:5000"
    volumes:
      - ${HISTORIAN_DATA_PATH:-historian_data}:/data
      - ../services/historian/logs:/var/log/historian
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 256m

  historian-ingest:
    build:
      context: ../services/historian
      dockerfile: Dockerfile
    command: ["python", "opcua_ingest.py"]
    environment:
      SERVICE_NAME: ${HISTORIAN_INGEST_SERVICE_NAME:-historian_ingest}
      DB_PATH: /data/historian.db
      EVENT_LOG_PATH: /var/log/historian/ingest.jsonl
      OPCUA_URL: ${OPCUA_URL:-opc.tcp://opcua:4840}
      NAMESPACE: ${OPCUA_NAMESPACE:-http://manufacturing.example/opcua}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-1.0}
    volumes:
      - ${HISTORIAN_DATA_PATH:-historian_data}:/data
      - ../services/historian/logs:/var/log/historian
    depends_on: [opcua]
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 128m

  # ── Monitoring (optional) ────────────────────────────────────────────────────
  # Start with: docker compose --profile monitoring up -d

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
    volumes:
      - ${GRAFANA_DATA_PATH:-grafana_data}:/var/lib/grafana
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 256m

  loki:
    image: grafana/loki:2.9.8
    profiles: [monitoring]
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ../monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - ${LOKI_DATA_PATH:-loki_data}:/loki
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 256m

  promtail:
    image: grafana/promtail:2.9.8
    profiles: [monitoring]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ../monitoring/wazuh/live-alerts:/var/ossec/logs/alerts:ro
      - ../monitoring/ml:/var/log/honeypot-ml:ro
      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ${PROMTAIL_POSITIONS_PATH:-promtail_positions}:/tmp
    depends_on: [loki]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 128m

  soc-publisher:
    build:
      context: ../services/historian
      dockerfile: Dockerfile
    profiles: [monitoring]
    command: ["python", "/app/publish_integration_soc.py"]
    environment:
      INTEGRATION_SOC_ALERTS_PATH: /var/ossec/logs/alerts/alerts.json
      INTEGRATION_SOC_ML_DIR: /var/log/honeypot-ml
      INTEGRATION_SOC_HIST_DIR: /var/log/historian
      INTEGRATION_SOC_ZEEK_DIR: /var/log/zeek/current
      INTEGRATION_SOC_AUTH_LOG: /var/log/auth.log
      INTEGRATION_SOC_POLL_SECONDS: ${INTEGRATION_SOC_POLL_SECONDS:-15}
      INTEGRATION_SOC_LOOKBACK_SECONDS: ${INTEGRATION_SOC_LOOKBACK_SECONDS:-7200}
      INTEGRATION_SOC_SESSION_ID: ${INTEGRATION_SOC_SESSION_ID:-INTEGRATION-LIVE}
    volumes:
      - ../scripts/publish_integration_soc.py:/app/publish_integration_soc.py:ro
      - ../monitoring/wazuh/live-alerts:/var/ossec/logs/alerts
      - ../monitoring/ml:/var/log/honeypot-ml
      - ../services/historian/logs:/var/log/historian:ro
      - /var/log/zeek:/var/log/zeek:ro
      - /var/log/auth.log:/var/log/auth.log:ro
    depends_on: [historian-web, historian-ingest, loki, promtail, zeek]
    networks: [ot-net]
    restart: unless-stopped
    mem_limit: 128m

  # ── Network Monitoring (optional) ────────────────────────────────────────────
  # network_mode: host lets Zeek see the Docker bridge interface (br-ot-net)
  # and all inter-container traffic flowing across it.

  zeek:
    image: zeek/zeek:latest
    profiles: [monitoring]
    network_mode: host
    cap_add: [NET_RAW, NET_ADMIN]
    volumes:
      - ../monitoring/zeek:/opt/zeek/share/zeek/site:ro
      - ../services/historian/logs:/var/log/honeypot:ro
      - /var/log/zeek:/opt/zeek/spool/zeek
    entrypoint: []
    command: >-
      sh -c '
        iface=$$(ip -o -4 addr show |
          awk "$$4 !~ /^10[.]0[.]2[.]/ && $$2 != \"lo\" && $$2 !~ /^(docker|br-|veth)/ { sub(/\/.*/, \"\", $$4); print $$2; exit }");
        iface=$${iface:-eth0};
        mkdir -p /opt/zeek/spool/zeek;
        cd /opt/zeek/spool/zeek;
        exec zeek -C -i "$$iface"
          /opt/zeek/share/zeek/site/discovery_scan_detect.zeek
          /opt/zeek/share/zeek/site/opcua_write_detect.zeek
          /opt/zeek/share/zeek/site/arp_mitm_detect.zeek
      '
    restart: unless-stopped
    mem_limit: 256m
