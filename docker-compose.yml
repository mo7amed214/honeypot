# LEGACY: single-host historian compose kept for compatibility.
# Prefer compose/docker-compose.historian.yml in the split layout.

services:
  historian_web:
    build:
      context: ./services/historian
      dockerfile: Dockerfile
    container_name: historian_web
    command: ["/app/docker-entrypoint.sh"]
    environment:
      DB_PATH: /data/historian.db
      EVENT_LOG_PATH: /var/log/historian/events.jsonl
      HISTORIAN_USERNAME: operator
      HISTORIAN_PASSWORD: operator123
      SERVER_BASE: http://localhost:5000
    ports:
      - "5000:5000"
    volumes:
      - historian_data:/data
      - historian_logs:/var/log/historian
    restart: unless-stopped

  historian_ingest:
    build:
      context: ./services/historian
      dockerfile: Dockerfile
    container_name: historian_ingest
    command: ["python", "opcua_ingest.py"]
    environment:
      DB_PATH: /data/historian.db
      EVENT_LOG_PATH: /var/log/historian/ingest.jsonl
      OPCUA_URL: "opc.tcp://192.168.1.11:4840"
      NAMESPACE: http://manufacturing.example/opcua
      POLL_INTERVAL_SECONDS: "1.0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - historian_data:/data
      - historian_logs:/var/log/historian
    restart: unless-stopped

volumes:
  historian_data:
  historian_logs:
