# Samba's vfs_full_audit module (smb.conf: full_audit:facility = local7)
# logs bait-file access via syslog - but this minimal container never ran a
# syslog daemon, so those messages had nowhere to go and were silently
# dropped, no matter what an attacker did. This rule captures them.
#
# /var/log/samba is bind-mounted under the EWS's /opt/honeypot vboxsf mount
# (root:root, dmode=750 - the deception hardening keeping john blind to
# compose/source files). vboxsf ignores chmod entirely, and the default
# rsyslogd drops privileges to the unprivileged "syslog" user after start
# (see /etc/rsyslog.conf's $PrivDropToUser), which can never write there.
# Cancel the privilege drop so rsyslogd stays root and can actually create
# the log file - same fix pattern as loki needing `user: "0:0"` for the same
# underlying mount constraint.
$PrivDropToUser root
$PrivDropToGroup root

local7.*    -/var/log/samba/full_audit.log
& stop
