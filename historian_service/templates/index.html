<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manufacturing Historian Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #c9d1d9;
      padding: 24px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 48px 52px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }

    .badge {
      display: inline-block;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #58a6ff;
      background: rgba(88,166,255,.1);
      border: 1px solid rgba(88,166,255,.25);
      border-radius: 20px;
      padding: 3px 12px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #e6edf3;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: .95rem;
      color: #8b949e;
      margin-bottom: 36px;
      line-height: 1.55;
    }

    .divider {
      border: none;
      border-top: 1px solid #21262d;
      margin-bottom: 28px;
    }

    .section-label {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 10px;
    }

    /* Browse button */
    .btn-browse {
      display: block;
      width: 100%;
      padding: 11px 0;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: .95rem;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      margin-bottom: 28px;
    }
    .btn-browse:hover {
      background: #30363d;
      border-color: #58a6ff;
      color: #e6edf3;
    }
    .btn-browse svg {
      vertical-align: middle;
      margin-right: 7px;
      margin-top: -2px;
    }

    /* Query form */
    .form-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: .95rem;
      outline: none;
      transition: border-color .15s;
    }
    input[type="text"]::placeholder { color: #484f58; }
    input[type="text"]:focus { border-color: #58a6ff; }

    button[type="submit"] {
      padding: 10px 20px;
      background: #1f6feb;
      border: 1px solid #388bfd;
      border-radius: 6px;
      color: #fff;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    button[type="submit"]:hover { background: #388bfd; }

    footer {
      margin-top: 32px;
      font-size: .78rem;
      color: #484f58;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge">OT Level 3 &mdash; Historian</div>
    <h1>Manufacturing Historian Portal</h1>
    <p class="subtitle">Query historical process telemetry from instrumented assets on the plant network.</p>

    <hr class="divider" />

    <p class="section-label">Browse all tags</p>
    <a href="/portal/tags" class="btn-browse">
      <svg width="16" height="16" fill="none" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 4h12M2 8h8M2 12h5" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      View all available tags
    </a>

    <p class="section-label">Site overview</p>
    <a href="/portal/overview" class="btn-browse">
      <svg width="16" height="16" fill="none" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="5" height="5" rx="1" stroke="#58a6ff" stroke-width="1.5"/>
        <rect x="9" y="2" width="5" height="5" rx="1" stroke="#58a6ff" stroke-width="1.5"/>
        <rect x="2" y="9" width="5" height="5" rx="1" stroke="#58a6ff" stroke-width="1.5"/>
        <rect x="9" y="9" width="5" height="5" rx="1" stroke="#58a6ff" stroke-width="1.5"/>
      </svg>
      Site operations overview
    </a>

    <p class="section-label">Query by tag name</p>
    <form method="get" action="/portal/history">
      <div class="form-row">
        <input type="text" name="tag" placeholder="e.g. line1_conveyor_speed_mpm" autocomplete="off" />
        <button type="submit">Query</button>
      </div>
    </form>
  </div>

  <footer>Manufacturing Historian Portal &mdash; Internal Use Only</footer>

</body>
</html>
