version: "3.9"

services:
  historian-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: historian-web
    command: ["/app/docker-entrypoint.sh"]
    environment:
      DB_PATH: /data/historian.db
      EVENT_LOG_PATH: /var/log/historian/events.jsonl
      HISTORIAN_USERNAME: operator
      HISTORIAN_PASSWORD: operator123
      SERVER_BASE: http://localhost:5000
    ports:
      - "5000:5000"
    volumes:
      - historian_data:/data
      - historian_logs:/var/log/historian
    restart: unless-stopped

  historian-ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: historian-ingest
    command: ["python", "opcua_ingest.py"]
    environment:
      DB_PATH: /data/historian.db
      EVENT_LOG_PATH: /var/log/historian/events.jsonl
      OPCUA_URL: opc.tcp://host.docker.internal:4840/freeopcua/server/
      NAMESPACE: http://manufacturing.example/opcua
      POLL_INTERVAL_SECONDS: "3.0"
    volumes:
      - historian_data:/data
      - historian_logs:/var/log/historian
    restart: unless-stopped

volumes:
  historian_data:
  historian_logs:
